<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UXTRALY | Oficial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0a08;
            --bg-elevated: #141210;
            --card-bg: #121009;
            --gold: #c8a24a;
            --gold-bright: #e7c777;
            --text-main: #f3ede0;
            --text-secondary: #9b9388;
            --border-color: #2a261e;
            --border-bright: #45391f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        a {
            color: inherit;
        }

        :focus-visible {
            outline: 1px solid var(--gold-bright);
            outline-offset: 3px;
        }

        /* ---------- Promo bar ---------- */
        .promo-bar {
            background-color: var(--bg-elevated);
            color: var(--gold-bright);
            text-align: center;
            padding: 9px 0;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-top: 1px solid var(--border-bright);
            border-bottom: 1px solid var(--border-bright);
        }

        /* ---------- Header ---------- */
        header {
            padding: 18px 5% 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(11, 10, 8, 0.92);
            backdrop-filter: blur(10px);
            z-index: 1000;
            flex-direction: column;
            gap: 16px;
        }

        .logo-container {
            text-decoration: none;
        }

        .logo-img {
            height: 46px;
            width: auto;
            object-fit: contain;
            filter: grayscale(1) brightness(1.6);
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
        }

        nav a {
            position: relative;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 4px;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.35s ease;
        }

        nav a:hover {
            color: var(--text-main);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* ---------- Hero ---------- */
        .hero {
            position: relative;
            width: 100%;
            height: 460px;
            max-height: 62vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-stone {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 50% at 18% 25%, rgba(200, 162, 74, 0.10), transparent 60%),
                radial-gradient(ellipse 50% 55% at 82% 75%, rgba(200, 162, 74, 0.07), transparent 60%),
                radial-gradient(ellipse 70% 80% at 50% 50%, rgba(231, 199, 119, 0.04), transparent 70%),
                repeating-linear-gradient(125deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 4px),
                linear-gradient(160deg, #0b0a08, #161310 50%, #0b0a08);
            background-size: 200% 200%;
            background-position: 0% 0%;
            animation: stoneShift 24s ease-in-out infinite alternate;
        }

        @keyframes stoneShift {
            0%   { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .hero-watermark {
            position: absolute;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(4rem, 16vw, 11rem);
            color: rgba(200, 162, 74, 0.06);
            letter-spacing: 2px;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        .hero-frame {
            position: relative;
            width: min(78%, 420px);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-bright);
            background: rgba(20, 18, 16, 0.4);
            box-shadow: 0 0 60px rgba(200, 162, 74, 0.05);
        }

        .hero-frame img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        /* ---------- Layout ---------- */
        .container {
            padding: 64px 5% 40px;
        }

        .section-heading {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 36px;
        }

        .eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
        }

        .section-title {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            letter-spacing: 0.3px;
        }

        .section-rule {
            width: 56px;
            height: 1px;
            background: var(--gold);
            margin-top: 10px;
        }

        /* ---------- Product grid ---------- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(18px);
            animation: cardIn 0.6s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.15s; }
        .product-card:nth-child(3) { animation-delay: 0.25s; }
        .product-card:nth-child(4) { animation-delay: 0.35s; }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-bright);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #0e0d0a;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.06);
        }

        .product-info h3 {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            min-height: 2.3rem;
            color: var(--text-main);
        }

        .coming-soon {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--gold-bright);
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--border-bright);
            padding: 5px 12px;
        }

        .coming-soon::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }

        /* ---------- Footer ---------- */
        footer {
            padding: 48px 5% 36px;
            background-color: var(--bg-elevated);
            border-top: 1px solid var(--border-bright);
            text-align: center;
        }

        .footer-tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 26px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-bottom: 26px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: 1px solid var(--border-bright);
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--gold-bright);
            border-color: var(--gold);
        }

        .social-links svg {
            width: 16px;
            height: 16px;
        }

        .footer-copy {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 768px) {
            .hero { height: 320px; }
            .logo-img { height: 38px; }
            .container { padding: 48px 6% 32px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
            html { scroll-behavior: auto; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        Solo envíos en la ciudad
    </div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="ONYX" class="logo-img">
        </a>

        <nav>
            <a href="categorías.html">Categorías</a>
            <a href="index.html">Productos</a>
            <a href="info.html">Info</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-stone"></div>
        <span class="hero-watermark">Onyx</span>
        <div class="hero-frame">
            <img src="IMG1.png" alt="ONYX destacado">
        </div>
    </section>

    <main class="container">
        <div class="section-heading">
            <span class="eyebrow">Colección</span>
            <h2 class="section-title">Nuevos Drops</h2>
            <div class="section-rule"></div>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="jplblp.jpg" alt="Jean Paul le beau le parfum">
                </div>
                <div class="product-info">
                    <h3>Jean Paul le beau le parfum</h3>
                    <p class="coming-soon">Coming soon</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="muratravis.jpg" alt="Innedit Mura travis Crystals Black">
                </div>
                <div class="product-info">
                    <h3>Innedit Mura travis Crystals Black</h3>
                    <p class="coming-soon">Coming soon</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="versacepourhomme.jpg" alt="Versace pour homme">
                </div>
                <div class="product-info">
                    <h3>Versace pour homme</h3>
                    <p class="coming-soon">Coming soon</p>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="sadboyz.jpg" alt="Dandy hats $ad Boyz">
                </div>
                <div class="product-info">
                    <h3>Dandy hats $ad Boyz</h3>
                    <p class="coming-soon">Coming soon</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p class="footer-tagline">Piezas exclusivas. Tiraje limitado.</p>

        <div class="social-links">
            <a href="#" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
            </a>
            <a href="#" aria-label="TikTok">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 4v9.5a3.5 3.5 0 1 1-3-3.46"/><path d="M14 4c0 2.5 2 4.5 4.5 4.5"/></svg>
            </a>
            <a href="#" aria-label="WhatsApp">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21l1.4-4.2A8 8 0 1 1 8.2 19.6L3 21z"/></svg>
            </a>
        </div>

 
    </footer>

    <script>
        // Reveal product cards on scroll (skips entirely if reduced motion is preferred)
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            const cards = document.querySelectorAll('.product-card');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            cards.forEach(card => observer.observe(card));
        }
    </script>

</body>
</html>
